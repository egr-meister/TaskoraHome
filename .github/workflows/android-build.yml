name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build signed release APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Platform 35 and Build Tools 35.0.0
        run: |
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" >/dev/null

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Ensure Gradle wrapper is present
        # The wrapper JAR is a binary and may not be committed; regenerate it so
        # ./gradlew works. Uses the Gradle provisioned above.
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/taskora-release-key.p12"
          echo "Keystore decoded to a temporary file."

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/taskora-release-key.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Build signed release AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/taskora-release-key.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon --stacktrace

      - name: Locate release APK
        id: findapk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No release APK found."
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      - name: Verify APK signature and certificate
        run: |
          BUILD_TOOLS_DIR="$ANDROID_SDK_ROOT/build-tools/35.0.0"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          echo "Verifying: ${{ steps.findapk.outputs.apk_path }}"
          CERT_OUTPUT="$("$APKSIGNER" verify --print-certs "${{ steps.findapk.outputs.apk_path }}")"
          echo "$CERT_OUTPUT"
          if echo "$CERT_OUTPUT" | grep -q "CN=Android Debug"; then
            echo "::error::Release artifact is signed with the Android debug certificate."
            exit 1
          fi
          echo "Signature verification passed."

      - name: Upload signed APK (test artifact)
        uses: actions/upload-artifact@v4
        with:
          name: taskora-home-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload signed AAB (Google Play artifact)
        uses: actions/upload-artifact@v4
        with:
          name: taskora-home-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
